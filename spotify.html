<!DOCTYPE html>
<html>
    <link rel="icon" src="imges/spotify.svg">
    <title>Spotify.com</title>
    <head>
        <link rel="Stylesheet" href="style/main.css">
        <link rel="Stylesheet" href="style/header.css">
        <link rel="Stylesheet" href="style/general.css">
        <link rel="Stylesheet" href="style/sidebar.css">
        <link rel="Stylesheet" href="style/downbar.css">
        <body>

             <div class="header-1">
                <div><img src="imges/spotify.svg"> </div>
                <div class="header-middle"><button class="button-home"><svg
                    align-self="center"
                    width="40"
                    height="40"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path d="M6 12L12 6L18 12V18H14V14H10V18H6V12Z" stroke="white" stroke-width="1" fill="white" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                
                </button>
                    <button class="button-search"><svg
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                        stroke="white"
                        stroke-width="2"
                    >
                        <circle cx="11" cy="11" r="7" stroke="white" stroke-width="2" fill="none"/>
                        <line x1="16" y1="16" x2="22" y2="22" stroke="white" stroke-width="2"/>
                    </svg>
                    </button>
                    <input class="search-bar" type="search" placeholder="What do you want to play?">
                    <button class="button-layer"></button>
                    <button class="button-add">&#65291</button>
                </div>
                <div class="header-right">
                    <button class="button-explore">Explore Premium</button>
                    <button class="button-install">Install App</button>
                    <button class="button-notification"><img src="icons/notifications.svg"></button>
                    <button class="button-mypf"><img src="imges/dog.jpg"></button>
                </div>
             </div>


            <div  class="header-2">
                <button>All</button>
                <button>Music</button>
                <button>Podcasts</button>
            </div>

            <div class="sidebar">
                <div class="sidebar-upper">
                <div class="sidebar-header">
                   <div class="library">
                     <div><button  class="button-library">Your Library</button></div>
                    <div class="button-inst">
                       <button>&#65291</button>
                       <button>&#8594</button>
                    </div>
                   </div>
                </div>
                <div class="button-category">
                    <button>Playlist</button>
                    <button>Artist</button>
                </div>
                   <div class="sidebar-searchbar">
                    <div>  <button class=" sidebar-button-search"><svg
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                        stroke="rgb(188, 188, 188)"
                        stroke-width="2"
                    >
                        <circle cx="11" cy="11" r="7" stroke="rgb(188, 188, 188)" stroke-width="2" fill="none"/>
                        <line x1="16" y1="16" x2="22" y2="22" stroke="white" stroke-width="2"/>
                    </svg>
                    </button></div>
                    <div>
                        <Button class="button-recent"><p>Recents</p>
                            <svg data-encore-id="icon" role="img" aria-hidden="true" class="Svg-sc-ytk21e-0 cAMMLk e-9541-icon" width="15" height="15" stroke="rgb(188, 188, 188)" align-content="center" viewBox="0 0 16 16">
                                <path d="M15 14.5H5V13h10v1.5zm0-5.75H5v-1.5h10v1.5zM15 3H5V1.5h10V3zM3 3H1V1.5h2V3zm0 11.5H1V13h2v1.5zm0-5.75H1v-1.5h2v1.5z"></path>
                              </svg>
                        </Button>
                    </div>

                   </div>
                <div class="sidebar-playlist-section js-sidebar-playlist">
                   
                    </div> 
                </div>
                   
               
               
            </div>
             
            <div class="section-title"><p class="section-name">Recommendation songs</p>
           <P class="show-all">show all</P></div>
           <div class="section-album js-section-album">
           
            </div>

            <div class="section-title"><p class="section-name">TOP ARTISTS</p>
                <P class="show-all">show all</P></div>
                <div class="section-album js-top-artist-section">
                 
                </div>

                


           <div class="downbar">
              <div class="playing js-playing">
              
              </div>
                <audio class="audio"></audio>
              
             <div class="downbar-middle">
                <div class="play-buttons">
                    <button class="shuffel-button"><svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="21"
                        height="21"
                        viewBox="0 0 21 21"
                        fill="rgba(255, 255, 255, 0.3)"
                        stroke="rgba(255, 255, 255, 0.3)"
                        stroke-width="3"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" y1="20" x2="21" y2="3"></line>
                        <polyline points="21 16 21 21 16 21"></polyline>
                        <line x1="15" y1="15" x2="21" y2="21"></line>
                        <line x1="4" y1="4" x2="9" y2="9"></line>
                    </svg>
                    </button>
                    <button class="shuffel-button js-prev-button"><svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="rgba(255, 255, 255, 0.3)"
                        stroke="none"
                    >
                        <polygon points="18 20 6 12 18 4"></polygon>
                        <rect x="4" y="4" width="2" height="16"></rect>
                    </svg>
                    </button>
                    <button class="play-button js-play-button"><span style="width: 16px;
                    height: 16px">▶</span>
                    </button>
                    <button class="next-button js-next-button">
                        <img src="icons/next-button.png">
                    </button>
                    <button class="repeat-button">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="rgba(255, 255, 255, 0.3)">
                            <path d="M7 4h10a4 4 0 0 1 4 4v1a1 1 0 1 1-2 0V8a2 2 0 0 0-2-2H7v2.5a1 1 0 0 1-1.707.707L2.707 6.207a1 1 0 0 1 0-1.414L5.293 2.207A1 1 0 0 1 7 3v1Zm10 16H7a4 4 0 0 1-4-4v-1a1 1 0 1 1 2 0v1a2 2 0 0 0 2 2h10v-2.5a1 1 0 0 1 1.707-.707l2.586 2.586a1 1 0 0 1 0 1.414l-2.586 2.586A1 1 0 0 1 17 21v-1Z"/>
                          </svg>
                          
                    </button>
                </div>

                <div class="progress-bar">
                    <div class="progress" ></div>
                  </div>
             </div>

              <div class="sound-function">
                <button>
        
                </button>
                <input class="volume" type="range">
                  <button></button>
                  
              </div>

           </div>

           <div class="add-playlist-popup js-popup">

                <div class="popup-header">
                    <p>Add to playlist</p>
                </div>

                <div class="playlist-search">
                    <input type="text" placeholder="Find a playlist">
                </div>

                <div class="new-playlist">
                    <span class="plus">+</span>
                    <p>New playlist</p>
                </div>

                <div class="playlist-list js-popup-playlist">

                    <div class="playlist-item">
                    <img src="liked.jpg" alt="">
                    <p>Liked Songs</p>
                    <span class="check">✔</span>
                    </div>

                    <div class="playlist-item">
                    <img src="anime.jpg" alt="">
                    <p>Anime songs</p>
                    <input type="radio">
                    </div>

                </div>

                <div class="popup-footer js-cancel-btn">
                    <button>Cancel</button>
                </div>

            </div>

            
         <script type="module" src="script/main.js"></script>
         <script type="module" src="script/sidebar.js"></script>

        </body>
       
    </head>
</html>
